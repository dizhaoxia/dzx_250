<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Photoshop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="toolbar">
            <div class="tool-group">
                <span class="group-label">工具</span>
                <button id="btn-brush" class="tool-btn active" title="画笔工具 (B)">🖌️</button>
                <button id="btn-eraser" class="tool-btn" title="橡皮擦工具 (E)">🧽</button>
                <button id="btn-select" class="tool-btn" title="矩形选框 (M)">⬜</button>
                <button id="btn-move-selection" class="tool-btn" title="移动选区 (V)">✋</button>
                <button id="btn-wand" class="tool-btn" title="魔棒工具 (W)">🪄</button>
                <button id="btn-text" class="tool-btn" title="文字工具 (T)">T</button>
                <button id="btn-gradient" class="tool-btn" title="渐变工具 (G)">🌈</button>
                <button id="btn-transform" class="tool-btn" title="自由变换 (Ctrl+T / Cmd+T)">🔄</button>
            </div>
            <div class="tool-group">
                <span class="group-label">画笔</span>
                <label>颜色 <input type="color" id="brush-color" value="#000000"></label>
                <label>大小 <input type="range" id="brush-size" min="1" max="100" value="5"><span id="brush-size-val">5</span></label>
                <label>不透明度 <input type="range" id="brush-opacity" min="1" max="100" value="100"><span id="brush-opacity-val">100%</span></label>
                <label class="checkbox-label"><input type="checkbox" id="pressure-sensitivity"> 压力感</label>
            </div>
            <div class="tool-group">
                <span class="group-label">魔棒</span>
                <label>容差 <input type="range" id="wand-tolerance" min="1" max="255" value="32"><span id="wand-tolerance-val">32</span></label>
            </div>
            <div class="tool-group">
                <span class="group-label">渐变</span>
                <label>类型
                    <select id="gradient-type">
                        <option value="linear">线性</option>
                        <option value="radial">径向</option>
                    </select>
                </label>
            </div>
            <div class="tool-group">
                <span class="group-label">滤镜</span>
                <button id="btn-blur" class="tool-btn" title="模糊滤镜">模糊</button>
                <button id="btn-sharpen" class="tool-btn" title="锐化滤镜">锐化</button>
                <label>强度 <input type="range" id="filter-strength" min="1" max="20" value="3"><span id="filter-strength-val">3</span></label>
                <label class="checkbox-label"><input type="checkbox" id="filter-preview" checked> 预览</label>
                <label class="checkbox-label"><input type="checkbox" id="smart-filter-mode"> 智能</label>
            </div>
            <div class="tool-group">
                <span class="group-label">调整图层</span>
                <button id="btn-bc-layer" class="tool-btn" title="亮度/对比度">亮/对</button>
                <button id="btn-hs-layer" class="tool-btn" title="色相/饱和度">色/饱</button>
            </div>
            <div class="tool-group" id="adjustment-controls">
                <span class="group-label">参数</span>
                <label>亮度 <input type="range" id="adj-brightness" min="-100" max="100" value="0"><span id="adj-brightness-val">0</span></label>
                <label>对比度 <input type="range" id="adj-contrast" min="-100" max="100" value="0"><span id="adj-contrast-val">0</span></label>
                <label>色相 <input type="range" id="adj-hue" min="-180" max="180" value="0"><span id="adj-hue-val">0</span></label>
                <label>饱和 <input type="range" id="adj-saturation" min="-100" max="100" value="0"><span id="adj-saturation-val">0</span></label>
                <label>明度 <input type="range" id="adj-lightness" min="-100" max="100" value="0"><span id="adj-lightness-val">0</span></label>
            </div>
            <div class="tool-group">
                <span class="group-label">蒙版</span>
                <button id="btn-add-mask" class="tool-btn" title="添加蒙版 / 选区转蒙版">➕蒙版</button>
                <button id="btn-toggle-mask" class="tool-btn" title="启/停蒙版">👁蒙</button>
                <button id="btn-delete-mask" class="tool-btn" title="删除蒙版">🗑蒙</button>
                <button id="btn-selection-to-mask" class="tool-btn" title="选区转蒙版">选区→蒙</button>
                <label class="checkbox-label"><input type="checkbox" id="edit-mask-mode"> 编辑蒙版</label>
                <label>蒙版笔
                    <select id="mask-brush-color">
                        <option value="255" selected>白(显)</option>
                        <option value="128">灰(半)</option>
                        <option value="0">黑(隐)</option>
                    </select>
                </label>
            </div>
            <div class="tool-group">
                <span class="group-label">选区</span>
                <button id="btn-clear-selection" class="tool-btn" title="取消选区 (Esc)">取消</button>
                <button id="btn-fill-selection" class="tool-btn" title="填充颜色">填充</button>
                <button id="btn-copy-selection" class="tool-btn" title="复制 (Ctrl+C)">复制</button>
                <button id="btn-cut-selection" class="tool-btn" title="剪切 (Ctrl+X)">剪切</button>
                <button id="btn-paste-selection" class="tool-btn" title="粘贴 (Ctrl+V)">粘贴</button>
            </div>
            <div class="tool-group">
                <span class="group-label">历史</span>
                <button id="btn-undo" class="tool-btn" title="撤销 (Ctrl+Z)">↩️</button>
                <button id="btn-redo" class="tool-btn" title="重做 (Shift+Ctrl+Z)">↪️</button>
            </div>
        </div>

        <div id="main-area">
            <div id="canvas-container">
                <div id="canvas-wrapper">
                    <canvas id="main-canvas"></canvas>
                    <canvas id="overlay-canvas"></canvas>
                    <canvas id="preview-canvas"></canvas>
                </div>
            </div>

            <div id="right-panel">
                <div id="layer-panel">
                    <div class="panel-header">
                        <span>图层</span>
                        <div class="panel-actions">
                            <button id="btn-add-layer" title="新建图层">➕</button>
                            <button id="btn-delete-layer" title="删除图层">🗑️</button>
                            <button id="btn-duplicate-layer" title="复制图层">📋</button>
                            <button id="btn-merge-visible" title="合并可见图层">🔗</button>
                        </div>
                    </div>
                    <div class="layer-opacity-control">
                        <label>不透明度 <input type="range" id="layer-opacity" min="0" max="100" value="100"><span id="layer-opacity-val">100%</span></label>
                    </div>
                    <ul id="layer-list"></ul>
                </div>
            </div>
        </div>

        <div id="status-bar">
            <span id="status-tool">画笔工具</span>
            <span id="status-pos">0, 0</span>
            <span id="status-selection"></span>
            <span id="status-history"></span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
